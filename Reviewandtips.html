<!DOCTYPE html>
<html>

<head>
  <title>Tips</title>
  <link rel="stylesheet" href="design.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <div class="form-box active" id="login-form">
      <form action="">
        <div class="logo-area">
          <div class="logo-name">
            <span style="color: #7494ec;">Swap</span><span style="color: #1a1f36;">Skill</span>
          </div>
        </div>
        <h2>Sign In</h2>
        <input type="email" name="Email" placeholder="Email" required>
        <input type="password" name="Password" placeholder="Password" required>
        <button type="button" name="login">Login</button>
        <p>Dont have an account? <a href="#" onclick="showForm('register-form')">Sign Up</a></p>
        <div class="divider">or you can sign in with</div>
        <div class="social-icons">
          <div class="social-btn" id="google-login" title="Sign in with Google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
          </div>
        </div>
      </form>
    </div>

    <div class="form-box" id="register-form">
      <form action="">
        <h2>Register</h2>
        <input type="text" name="Name" placeholder="Name" required>
        <input type="email" name="Email" placeholder="Email" required>
        <input type="password" name="Password" placeholder="Password" required>
        <button type="button" name="Register">Register</button>
        <p>Already have an account? <a href="#" onclick="showForm('login-form')">Login</a></p>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNyryTjGj1p6jZz-P-e1SBcBUiSRFMEXs",
      authDomain: "websystems-69e75.firebaseapp.com",
      projectId: "websystems-69e75",
      storageBucket: "websystems-69e75.firebasestorage.app",
      messagingSenderId: "851438179224",
      appId: "1:851438179224:web:cb1bd89bd44d7fe72411ed"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("google-login").addEventListener("click", () => {
      signInWithPopup(auth, provider)
        .then((result) => {
          alert("Welcome " + result.user.displayName + "!");
        })
        .catch((error) => {
          alert("Error: " + error.message);
        });
    });
  </script>

  <script src="loginscript.js"></script>

</body>

</html>

</body>

</html>
